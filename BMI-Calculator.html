<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body>
    
<form class="form">
    <br><br><br>
    <label >Height in CM</label>
    <input type="number" id="height"><br><br>
    <label >weight in Kg</label>
    <input type="number" id="weight"><br><br>
    <button type="submit">Calculate</button>
</form>
<div id="result"></div>
<div id="opinion"></div>



</body>


<script>
     const form = document.querySelector('.form')

     form.addEventListener('submit', function(e){
            e.preventDefault();
        const height = parseInt(document.querySelector('#height').value)
        const weight = parseInt(document.querySelector('#weight').value)
        const result = document.querySelector('#result')
        const opinion = document.querySelector('#opinion')

        if(height === "" || height< 0 || isNaN(height)){
            result.innerHTML = "Please enter Valid Height"
        }else if(weight === "" || weight< 0 || isNaN(weight)){
            result.innerHTML = "Please enter Valid weight"
        }else{
           const heightMeters = height / 100;

        const bmi = Number((weight / (heightMeters * heightMeters)).toFixed(2));

        result.innerHTML = `Your BMI is ${bmi}`;


if(bmi <= 18){
            opinion.innerHTML = "Under Weight"
        }  else if(bmi >= 18 && bmi <= 24){
            opinion.innerHTML = "Normal Weight"
        }else if(bmi >= 24){
            opinion.innerHTML = "over Weight"
        }


        }






     })

</script>
</html>
