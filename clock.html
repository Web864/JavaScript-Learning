<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        #clock{
            font-size: 300px;
            text-align: center;
            /* color: brown; */
        }
        .heading{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="center">
        <h1 class="heading">Current Local Time </h1>
        <div id="clock"></div>
    </div>
    
</body>
<script>
    const clock = document.querySelector('#clock')

    setInterval(() => {
        let date = new Date();
        // console.log(date);
        clock.innerHTML = date.toLocaleTimeString();
    }, 1000);

</script>

</html>
